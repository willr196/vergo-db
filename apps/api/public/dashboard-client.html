<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Client Dashboard | VERGO</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/vergo-styles.css">
  <link rel="stylesheet" href="/vergo-a11y.css">
  <link rel="stylesheet" href="/pages/css/dashboard-shared.css">
</head>
<body class="dashboard-page">
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Header strip -->
  <header class="dash-header" role="banner">
    <div class="dash-header-inner">
      <a href="/" class="dash-logo" aria-label="VERGO home">
        <span class="dash-logo-mark" aria-hidden="true">V</span>
        VERGO
      </a>
      <div class="dash-user-area">
        <span class="dash-user-name" id="header-company"></span>
        <span class="tier-badge" id="header-tier" aria-label="Account type"></span>
        <button class="btn-logout" id="logout-btn" type="button">Sign out</button>
      </div>
    </div>
  </header>

  <main id="main-content" class="dash-main">

    <!-- Loading -->
    <div class="dash-loading" id="loading-state" aria-busy="true" aria-label="Loading your dashboard">
      <div class="loading-ring" role="progressbar"></div>
      <p>Loading your dashboard…</p>
    </div>

    <!-- Error -->
    <div class="dash-alert dash-alert-error" id="error-state" hidden>
      <strong>Unable to load dashboard.</strong> <span id="error-msg"></span>
    </div>

    <!-- Dashboard content -->
    <div id="dashboard-content" hidden>

      <!-- 1. Active briefs -->
      <section class="dash-section" aria-labelledby="briefs-heading">
        <div class="dash-section-header">
          <h2 class="dash-section-title" id="briefs-heading">Active Briefs</h2>
          <span class="dash-section-count" id="briefs-count"></span>
        </div>
        <div class="card-grid" id="briefs-grid" aria-live="polite"></div>
      </section>

      <!-- 2. Upcoming confirmed events -->
      <section class="dash-section" aria-labelledby="events-heading">
        <div class="dash-section-header">
          <h2 class="dash-section-title" id="events-heading">Upcoming Events</h2>
          <span class="dash-section-count" id="events-count"></span>
        </div>
        <div class="card-grid" id="events-grid" aria-live="polite"></div>
      </section>

      <!-- 3. Brief history -->
      <section class="dash-section" aria-labelledby="history-heading">
        <div class="dash-section-header">
          <h2 class="dash-section-title" id="history-heading">Brief History</h2>
          <span class="dash-section-count" id="history-count"></span>
        </div>
        <div class="card-grid" id="history-grid" aria-live="polite"></div>
      </section>

    </div>
  </main>

  <script src="/auth.js"></script>
  <script src="/pages/js/dashboard-client.js"></script>
</body>
</html>
