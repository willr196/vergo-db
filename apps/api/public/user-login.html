<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Job Seeker Login | VERGO Events — Premium Event Staffing in London</title>
  <meta name="description" content="Sign in to your VERGO Events job seeker account to view applications, browse London event staffing roles, and update your profile.">
  <meta property="og:title" content="Job Seeker Login | VERGO Events — Premium Event Staffing in London">
  <meta property="og:description" content="Sign in to your VERGO Events job seeker account to view applications, browse London event staffing roles, and update your profile.">
  <meta property="og:image" content="https://vergoltd.com/logo.png">
  <meta property="og:url" content="https://vergoltd.com/user-login">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" href="/favicon.ico">
  <link rel="canonical" href="https://vergoltd.com/user-login">
<meta name="robots" content="noindex, nofollow">
<!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/vergo-a11y.css">
  <link rel="stylesheet" href="/vergo-public-pages.css">
  <link rel="stylesheet" href="/pages/css/public-auth.css">
</head>
<body class="public-auth-page">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="site-header" class="site-header" role="banner"></div>
  
  <main id="main-content" class="auth-main">
    <div class="auth-container auth-container-narrow">
      <div class="auth-box">
        <h1>Welcome Back</h1>
        <p class="subtitle">Log in to your VERGO account</p>
        
        <div id="message"></div>
        
        <form id="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email">
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
          </div>
          
          <a href="/forgot-password" class="forgot-link">Forgot password?</a>
          
          <button type="submit" class="btn">Log In</button>
        </form>
        
        <div id="resend-section" class="resend-section d-none">
          <p>Didn't receive verification email?</p>
          <button class="btn-link" type="button" id="resend-verification-btn">Resend verification email</button>
        </div>
        
        <div class="auth-footer">
          Don't have an account? <a href="/user-register">Create one</a>
        </div>
      </div>
      
      <a href="/jobs" class="back-link">← Back to Jobs</a>
    </div>
  </main>
  
  <footer role="contentinfo"></footer>
  

  <script src="/pages/js/user-login.js"></script>
  <script src="/vergo-public-shell.js"></script>
</body>
</html>
