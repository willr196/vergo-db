<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Job Applications | VERGO Events — Premium Event Staffing in London</title>
  <meta name="description" content="Review applications, candidate progress, and staffing pipelines from the VERGO Events admin job applications view.">
  <meta property="og:title" content="Admin Job Applications | VERGO Events — Premium Event Staffing in London">
  <meta property="og:description" content="Review applications, candidate progress, and staffing pipelines from the VERGO Events admin job applications view.">
  <meta property="og:image" content="https://vergoltd.com/logo.png">
  <meta property="og:url" content="https://vergoltd.com/admin-job-applications">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" href="/favicon.ico">
  <link rel="canonical" href="https://vergoltd.com/admin-job-applications">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/pages/css/admin-shared.css">
</head>
<body>

  <div class="as-main">
    <header class="as-topbar">
      <button id="as-menu-btn" aria-label="Toggle navigation">&#9776;</button>
      <span class="as-topbar-title">Job Applications</span>
    </header>

    <div class="as-content">
      <div id="alert-container"></div>

      <!-- Stats -->
      <div class="kpi-grid" id="stats-row">
        <div class="kpi-card"><div class="kpi-label">Total</div><div class="kpi-value" id="stat-total">-</div></div>
        <div class="kpi-card kpi-warning"><div class="kpi-label">Pending</div><div class="kpi-value" id="stat-pending">-</div></div>
        <div class="kpi-card"><div class="kpi-label">Shortlisted</div><div class="kpi-value" id="stat-shortlisted">-</div></div>
        <div class="kpi-card kpi-success"><div class="kpi-label">Confirmed</div><div class="kpi-value" id="stat-confirmed">-</div></div>
        <div class="kpi-card kpi-error"><div class="kpi-label">Rejected</div><div class="kpi-value" id="stat-rejected">-</div></div>
      </div>

      <!-- Filters -->
      <div class="as-filters">
        <div class="as-filter-group">
          <label>Status</label>
          <select id="filter-status">
            <option value="">All Statuses</option>
            <option value="PENDING">Pending</option>
            <option value="REVIEWED">Reviewed</option>
            <option value="SHORTLISTED">Shortlisted</option>
            <option value="CONFIRMED">Confirmed</option>
            <option value="REJECTED">Rejected</option>
            <option value="WITHDRAWN">Withdrawn</option>
          </select>
        </div>
        <div class="as-filter-group">
          <label>Job</label>
          <select id="filter-job">
            <option value="">All Jobs</option>
          </select>
        </div>
      </div>

      <!-- Table -->
      <div class="as-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Applicant</th>
              <th>Job</th>
              <th>Status</th>
              <th>Note</th>
              <th>Applied</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="applications-table">
            <tr><td colspan="6" class="loading"><div class="as-skeleton" style="margin:auto;max-width:200px"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detail-modal" class="modal-backdrop d-none">
    <div class="modal">
      <div class="modal-header">
        <h2>Application Details</h2>
        <button class="modal-close" type="button" data-action="close-modal">&#x2715;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer">
        <button class="btn btn-ghost" data-action="close-modal">Close</button>
      </div>
    </div>
  </div>

  <script src="/js/admin-core.js"></script>
  <script src="/js/admin-nav.js"></script>
  <script src="/pages/js/admin-job-applications.js"></script>
</body>
</html>
