<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Jobs | VERGO Events — Premium Event Staffing in London</title>
  <meta name="description" content="Publish, review, and manage VERGO Events job listings and staffing briefs from the internal admin jobs page.">
  <meta property="og:title" content="Admin Jobs | VERGO Events — Premium Event Staffing in London">
  <meta property="og:description" content="Publish, review, and manage VERGO Events job listings and staffing briefs from the internal admin jobs page.">
  <meta property="og:image" content="https://vergoltd.com/logo.png">
  <meta property="og:url" content="https://vergoltd.com/admin-jobs">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" href="/favicon.ico">
  <link rel="canonical" href="https://vergoltd.com/admin-jobs">
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/pages/css/admin-shared.css">
</head>
<body>

  <div class="as-main">
    <header class="as-topbar">
      <button id="as-menu-btn" aria-label="Toggle navigation">&#9776;</button>
      <span class="as-topbar-title">Jobs</span>
      <div class="as-topbar-right">
        <button class="btn btn-primary btn-sm" data-action="open-create-modal">+ Add Job</button>
      </div>
    </header>

    <div class="as-content">
      <div id="alert-container"></div>

      <!-- Pending banner -->
      <div id="pending-banner" class="pending-banner hidden">
        <div class="pending-banner-text">
          <strong><span id="pending-count">0</span> job(s) awaiting approval</strong>
        </div>
        <button class="btn btn-warning btn-sm" data-action="filter-pending">Review Now</button>
      </div>

      <!-- Filters -->
      <div class="as-filters">
        <div class="as-filter-group">
          <label>Status</label>
          <select id="filter-status">
            <option value="">All Statuses</option>
            <option value="DRAFT">Draft</option>
            <option value="OPEN">Open</option>
            <option value="FILLED">Filled</option>
            <option value="CLOSED">Closed</option>
          </select>
        </div>
        <div class="as-filter-group">
          <label>Type</label>
          <select id="filter-type">
            <option value="">All Types</option>
            <option value="INTERNAL">VERGO Jobs</option>
            <option value="EXTERNAL">External Jobs</option>
          </select>
        </div>
      </div>

      <!-- Table -->
      <div class="as-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Job</th>
              <th>Company</th>
              <th>Date</th>
              <th>Pay</th>
              <th>Apps</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="jobs-table">
            <tr><td colspan="7" class="loading"><div class="as-skeleton" style="margin:auto;max-width:200px"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Create/Edit Modal -->
  <div id="job-modal" class="modal-backdrop d-none">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2 id="modal-title">Add New Job</h2>
        <button class="modal-close" type="button" data-action="close-modal">&#x2715;</button>
      </div>
      <form id="job-form">
        <div class="modal-body">
          <div id="form-alert"></div>

          <div class="form-row">
            <div class="form-group full-width">
              <label class="as-label">Job Title *</label>
              <input type="text" name="title" required placeholder="e.g. Bartender - Corporate Event" class="as-input">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="as-label">Role *</label>
              <select name="roleId" required id="role-select" class="as-input">
                <option value="">Select role…</option>
              </select>
            </div>
            <div class="form-group">
              <label class="as-label">Type *</label>
              <select name="type" required class="as-input">
                <option value="EXTERNAL">External (Other Company)</option>
                <option value="INTERNAL">Internal (VERGO)</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="as-label">Company Name</label>
              <input type="text" name="companyName" placeholder="e.g. ABC Events Ltd" class="as-input">
            </div>
            <div class="form-group">
              <label class="as-label">Location *</label>
              <input type="text" name="location" required placeholder="e.g. Central London" class="as-input">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="as-label">Venue</label>
              <input type="text" name="venue" placeholder="e.g. The Dorchester Hotel" class="as-input">
            </div>
            <div class="form-group">
              <label class="as-label">Event Date</label>
              <input type="date" name="eventDate" class="as-input">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="as-label">Shift Start</label>
              <input type="time" name="shiftStart" class="as-input">
            </div>
            <div class="form-group">
              <label class="as-label">Shift End</label>
              <input type="time" name="shiftEnd" class="as-input">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="as-label">Pay Rate (£)</label>
              <input type="number" name="payRate" step="0.01" min="0" max="1000" placeholder="15.00" class="as-input">
            </div>
            <div class="form-group">
              <label class="as-label">Pay Type</label>
              <select name="payType" class="as-input">
                <option value="HOURLY">Per Hour</option>
                <option value="DAILY">Per Day</option>
                <option value="FIXED">Fixed Fee</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="as-label">Staff Needed</label>
              <input type="number" name="staffNeeded" min="1" value="1" class="as-input">
            </div>
            <div class="form-group">
              <label class="as-label">Status *</label>
              <select name="status" required class="as-input">
                <option value="DRAFT">Draft (hidden)</option>
                <option value="OPEN">Open (visible)</option>
                <option value="FILLED">Filled</option>
                <option value="CLOSED">Closed</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="as-label">Description *</label>
            <textarea name="description" required rows="4" placeholder="Describe the job, duties, what to expect…"></textarea>
          </div>

          <div class="form-group">
            <label class="as-label">Requirements</label>
            <textarea name="requirements" rows="3" placeholder="Experience needed, certifications, dress code…"></textarea>
          </div>

          <div class="form-group">
            <label class="as-label">Application Deadline</label>
            <input type="date" name="closingDate" class="as-input">
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" data-action="close-modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="save-btn">Save Job</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/admin-core.js"></script>
  <script src="/js/admin-nav.js"></script>
  <script src="/pages/js/admin-jobs.js"></script>
</body>
</html>
