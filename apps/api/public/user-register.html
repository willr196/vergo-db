<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Job Seeker Registration | VERGO Events — Premium Event Staffing in London</title>
  <meta name="description" content="Create a VERGO Events job seeker account to apply for premium London hospitality and event staffing work.">
  <meta property="og:title" content="Job Seeker Registration | VERGO Events — Premium Event Staffing in London">
  <meta property="og:description" content="Create a VERGO Events job seeker account to apply for premium London hospitality and event staffing work.">
  <meta property="og:image" content="https://vergoltd.com/logo.png">
  <meta property="og:url" content="https://vergoltd.com/user-register">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" href="/favicon.ico">
  <link rel="canonical" href="https://vergoltd.com/user-register">
<meta name="robots" content="noindex, nofollow">
<!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/vergo-a11y.css">
  <link rel="stylesheet" href="/vergo-public-pages.css">
  <link rel="stylesheet" href="/pages/css/public-auth.css">
</head>
<body class="public-auth-page">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="site-header" class="site-header" role="banner"></div>
  
  <main id="main-content" class="auth-main">
    <div class="auth-container auth-container-form">
      <div class="auth-box">
        <h1>Create Account</h1>
        <p class="subtitle">Join to apply for jobs and track your applications</p>
        
        <div id="message"></div>
        
        <form id="register-form">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name *</label>
              <input type="text" id="firstName" name="firstName" required autocomplete="given-name">
            </div>
            <div class="form-group">
              <label for="lastName">Last Name *</label>
              <input type="text" id="lastName" name="lastName" required autocomplete="family-name">
            </div>
          </div>
          
          <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required autocomplete="email">
          </div>
          
          <div class="form-group">
            <label for="phone">Phone (optional)</label>
            <input type="tel" id="phone" name="phone" autocomplete="tel">
          </div>
          
          <div class="form-group">
            <label for="password">Password *</label>
            <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
            <p class="hint">Minimum 8 characters</p>
          </div>
          
          <div class="form-group">
            <label for="confirmPassword">Confirm Password *</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8" autocomplete="new-password">
          </div>
          
          <button type="submit" class="btn">Create Account</button>
        </form>
        
        <div class="auth-footer">
          Already have an account? <a href="/user-login">Log in</a>
        </div>
      </div>
      
      <a href="/jobs" class="back-link">← Back to Jobs</a>
    </div>
  </main>
  
  <footer role="contentinfo"></footer>
  

  <script src="/pages/js/user-register.js"></script>
  <script src="/vergo-public-shell.js"></script>
  <script src="/vergo-analytics.js"></script>
</body>
</html>
