<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/logo.png">
  <title>Client Login - VERGO Ltd</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://vergoltd.com/client-login">
  <meta name="theme-color" content="#0a0a0a">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/vergo-a11y.css">
  <link rel="stylesheet" href="/vergo-public-pages.css">
  <link rel="stylesheet" href="/pages/css/public-auth.css">
</head>
<body class="public-auth-page client-auth-page">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="site-header" class="site-header" role="banner"></div>
  
  <main id="main-content" class="auth-main">
    <div class="auth-container auth-container-narrow">
      <div class="auth-box">
        <h1>Client Login</h1>
        <p class="subtitle">Access your client dashboard</p>
        
        <div class="toggle-type">
          <span>Looking for work?</span>
          <a href="/user-login">Job Seeker Login</a>
        </div>
        
        <div id="message"></div>
        
        <form id="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email">
          </div>
          
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
          </div>
          
          <a href="/forgot-password?type=client" class="forgot-link">Forgot password?</a>
          
          <button type="submit" class="btn">Log In</button>
        </form>
        
        <div id="resend-section" class="resend-section d-none">
          <p>Didn't receive verification email?</p>
          <button class="btn-link" type="button" id="resend-verification-btn">Resend verification email</button>
        </div>
        
        <div class="auth-footer">
          Don't have an account? <a href="/client-register">Register as a Client</a>
        </div>
      </div>
      
      <a href="/hire-staff" class="back-link">← Back to Hire Event Staff</a>
    </div>
  </main>
  
  <footer role="contentinfo"></footer>
  

  <script src="/pages/js/client-login.js"></script>
  <script src="/vergo-public-shell.js"></script>
</body>
</html>
