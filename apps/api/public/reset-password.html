<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/logo-small.png">
  <title>Set New Password - VERGO Ltd</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://vergoltd.com/reset-password">
  <meta name="theme-color" content="#0a0a0a">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/vergo-a11y.css">
  <link rel="stylesheet" href="/vergo-public-pages.css">
  <link rel="stylesheet" href="/pages/css/public-auth.css">
</head>
<body class="public-auth-page">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="site-header" class="site-header" role="banner"></div>
  
  <main id="main-content" class="auth-main">
    <div class="auth-container auth-container-narrow">
      <div class="auth-box" id="content">
        <h1 id="auth-title">Set New Password</h1>
        <p id="auth-subtitle" class="subtitle">Enter your new password below</p>
        
        <div id="message"></div>
        
        <form id="reset-form">
          <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" id="password" name="password" required minlength="8">
            <p class="hint">Minimum 8 characters</p>
          </div>
          
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8">
          </div>
          
          <button type="submit" class="btn">Reset Password</button>
        </form>
      </div>
    </div>
  </main>
  
  <footer role="contentinfo"></footer>
  

  <script src="/pages/js/reset-password.js"></script>
  <script src="/vergo-public-shell.js"></script>
  <script src="/vergo-analytics.js"></script>
</body>
</html>
